<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPU Fingerprint Debug</title>

<style>
body{
    font-family: monospace;
    background:#111;
    color:#eee;
    padding:20px;
}
.pass{color:#00ff88}
.fail{color:#ff4d4d}
.warn{color:#ffaa00}
.section{
    margin-top:30px;
    padding:10px;
    border:1px solid #444;
}
</style>

</head>

<body>

<h1>WebGL / Canvas / WebGPU Fingerprint Debug</h1>

<div id="summary"></div>
<div id="output"></div>

<script>

function print(title,data){

    const div=document.createElement("div")
    div.className="section"

    const h=document.createElement("h3")
    h.textContent=title

    const pre=document.createElement("pre")
    pre.textContent=JSON.stringify(data,null,2)

    div.appendChild(h)
    div.appendChild(pre)

    document.getElementById("output").appendChild(div)
}

function check(name,cond){

    const line=document.createElement("div")

    if(cond){
        line.innerHTML="✔ "+name
        line.className="pass"
    }else{
        line.innerHTML="✖ "+name
        line.className="fail"
    }

    document.getElementById("summary").appendChild(line)
}


const canvas=document.createElement("canvas")
const gl=canvas.getContext("webgl")
const gl2=canvas.getContext("webgl2")

if(!gl){
    alert("WebGL not supported")
}

const debug=gl.getExtension("WEBGL_debug_renderer_info")

const vendor=debug?gl.getParameter(debug.UNMASKED_VENDOR_WEBGL):"unknown"
const renderer=debug?gl.getParameter(debug.UNMASKED_RENDERER_WEBGL):"unknown"

check("WEBGL_debug_renderer_info available",!!debug)

check("Renderer exists",renderer!="unknown")

check("Vendor exists",vendor!="unknown")



/* ======================================
WEBGL PARAMETERS
====================================== */

const params={}

const paramList=[

"MAX_TEXTURE_SIZE",
"MAX_RENDERBUFFER_SIZE",
"MAX_VERTEX_ATTRIBS",
"MAX_TEXTURE_IMAGE_UNITS",
"MAX_VERTEX_TEXTURE_IMAGE_UNITS",
"MAX_COMBINED_TEXTURE_IMAGE_UNITS",
"MAX_CUBE_MAP_TEXTURE_SIZE",
"MAX_VIEWPORT_DIMS",
"ALIASED_LINE_WIDTH_RANGE",
"ALIASED_POINT_SIZE_RANGE",
"MAX_VERTEX_UNIFORM_VECTORS",
"MAX_FRAGMENT_UNIFORM_VECTORS",
"MAX_VARYING_VECTORS"

]

paramList.forEach(p=>{
    try{
        params[p]=gl.getParameter(gl[p])
    }catch(e){}
})

print("WebGL Parameters",params)



/* ======================================
EXTENSIONS
====================================== */

const extensions=gl.getSupportedExtensions()||[]

print("WebGL Extensions",extensions)

check("Extensions >= 30",extensions.length>=30)



/* ======================================
SHADER PRECISION
====================================== */

function precision(shader,type){

    const p=gl.getShaderPrecisionFormat(shader,type)

    return{

        rangeMin:p.rangeMin,
        rangeMax:p.rangeMax,
        precision:p.precision
    }
}

const shaderPrecision={

VERTEX_HIGH_FLOAT:precision(gl.VERTEX_SHADER,gl.HIGH_FLOAT),
VERTEX_MEDIUM_FLOAT:precision(gl.VERTEX_SHADER,gl.MEDIUM_FLOAT),
VERTEX_LOW_FLOAT:precision(gl.VERTEX_SHADER,gl.LOW_FLOAT),

FRAGMENT_HIGH_FLOAT:precision(gl.FRAGMENT_SHADER,gl.HIGH_FLOAT),
FRAGMENT_MEDIUM_FLOAT:precision(gl.FRAGMENT_SHADER,gl.MEDIUM_FLOAT),
FRAGMENT_LOW_FLOAT:precision(gl.FRAGMENT_SHADER,gl.LOW_FLOAT)

}

print("Shader Precision",shaderPrecision)



/* ======================================
CANVAS FINGERPRINT
====================================== */

function canvasFingerprint(){

    const c=document.createElement("canvas")
    const ctx=c.getContext("2d")

    ctx.textBaseline="top"
    ctx.font="14px Arial"
    ctx.fillStyle="#f60"
    ctx.fillRect(125,1,62,20)

    ctx.fillStyle="#069"
    ctx.fillText("fingerprint",2,15)

    return c.toDataURL()
}

const canvasFP=canvasFingerprint()

print("Canvas Fingerprint",canvasFP)



/* ======================================
WEBGPU
====================================== */

async function getWebGPU(){

if(!navigator.gpu){

print("WebGPU","not supported")
return

}

const adapter=await navigator.gpu.requestAdapter()

if(!adapter){

print("WebGPU","adapter not found")
return

}

const info={}

try{

const adapterInfo=await adapter.requestAdapterInfo()

info.vendor=adapterInfo.vendor
info.architecture=adapterInfo.architecture
info.description=adapterInfo.description
info.device=adapterInfo.device

}catch(e){}

print("WebGPU Adapter",info)

}

getWebGPU()



/* ======================================
GPU TIMING TEST
====================================== */

function gpuBenchmark(){

const t0=performance.now()

for(let i=0;i<5000;i++){

gl.clear(gl.COLOR_BUFFER_BIT)

}

const t1=performance.now()

return (t1-t0)

}

const gpuTime=gpuBenchmark()

print("GPU Timing Benchmark (ms)",gpuTime)



/* ======================================
INTEL PROFILE CHECK
====================================== */

function intelCheck(){

let ok=true

if(!renderer.toLowerCase().includes("intel")) ok=false

if(params.MAX_TEXTURE_SIZE<16384) ok=false

if(extensions.length<40) ok=false

return ok

}

check("Intel Profile Consistency",intelCheck())



/* ======================================
FINAL RESULT
====================================== */

function finalCheck(){

let issues=[]

if(!debug) issues.push("debug_renderer_info missing")

if(extensions.length<30) issues.push("extensions too few")

if(!renderer) issues.push("renderer empty")

if(issues.length===0){

document.getElementById("summary").innerHTML+=
"<h2 class='pass'>PASS — No obvious spoof detected</h2>"

}else{

document.getElementById("summary").innerHTML+=
"<h2 class='fail'>FAIL — Possible fingerprint spoof</h2>"

}

}

finalCheck()



print("Renderer",renderer)
print("Vendor",vendor)

</script>

</body>
</html>
