<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Browser Fingerprint Detector</title>
<style>
body{
    font-family: Arial;
    background:#111;
    color:#0f0;
    padding:30px;
}
button{
    padding:10px 20px;
    font-size:16px;
    margin-top:20px;
    cursor:pointer;
}
#results{
    margin-top:30px;
    white-space:pre-wrap;
    background:#000;
    padding:20px;
    border:1px solid #0f0;
    max-height:600px;
    overflow:auto;
}
</style>
</head>
<body>
<h1>Full Browser Fingerprint Detector</h1>
<p>Click the button below to collect the most complete fingerprint possible from this browser.</p>
<button id="runBtn">Run Detection</button>
<div id="results">Results will appear here...</div>

<script>
document.getElementById("runBtn").addEventListener("click", async function(){

    const results = {}

    try{
        // --- Navigator info ---
        results.navigator = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            vendor: navigator.vendor,
            product: navigator.product,
            hardwareConcurrency: navigator.hardwareConcurrency,
            deviceMemory: navigator.deviceMemory,
            language: navigator.language,
            languages: navigator.languages,
            webdriver: navigator.webdriver,
            maxTouchPoints: navigator.maxTouchPoints,
            doNotTrack: navigator.doNotTrack,
            cookieEnabled: navigator.cookieEnabled
        }

        // --- Screen info ---
        results.screen = {
            width: screen.width,
            height: screen.height,
            availWidth: screen.availWidth,
            availHeight: screen.availHeight,
            colorDepth: screen.colorDepth,
            pixelDepth: screen.pixelDepth,
            devicePixelRatio: window.devicePixelRatio
        }

        // --- Window info ---
        results.window = {
            innerWidth: window.innerWidth,
            innerHeight: window.innerHeight,
            outerWidth: window.outerWidth,
            outerHeight: window.outerHeight
        }

        // --- Time info ---
        results.time = {
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset(),
            locale: Intl.DateTimeFormat().resolvedOptions().locale
        }

        // --- Plugins & MimeTypes ---
        results.plugins = Array.from(navigator.plugins).map(p=>p.name)
        results.mimeTypes = Array.from(navigator.mimeTypes).map(m=>m.type)

        // --- Canvas fingerprint ---
        try{
            const canvas = document.createElement("canvas")
            const ctx = canvas.getContext("2d")
            ctx.textBaseline="top"
            ctx.font="16px Arial"
            ctx.fillText("fingerprint-test",2,2)
            results.canvas = canvas.toDataURL()
        }catch(e){ results.canvas = "error" }

        // --- WebGL fingerprint ---
        try{
            const glCanvas = document.createElement("canvas")
            const gl = glCanvas.getContext("webgl") || glCanvas.getContext("experimental-webgl")
            if(gl){
                const dbg = gl.getExtension("WEBGL_debug_renderer_info")
                if(dbg){
                    results.webgl = {
                        vendor: gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL),
                        renderer: gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)
                    }
                } else { results.webgl = "hidden" }
            } else { results.webgl = "no-webgl" }
        }catch(e){ results.webgl = "error" }

        // --- Audio fingerprint ---
        try{
            const audioCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1,44100,44100)
            const oscillator = audioCtx.createOscillator()
            oscillator.type="triangle"
            oscillator.frequency.value=10000
            const compressor = audioCtx.createDynamicsCompressor()
            oscillator.connect(compressor)
            compressor.connect(audioCtx.destination)
            oscillator.start(0)
            const buffer = await audioCtx.startRendering()
            const data = buffer.getChannelData(0)
            let sum=0
            for(let i=0;i<data.length;i++) sum += Math.abs(data[i])
            results.audio = sum
        }catch(e){ results.audio = "error" }

        // --- Media Devices ---
        try{
            const devices = await navigator.mediaDevices.enumerateDevices()
            results.mediaDevices = devices.map(d=>({kind:d.kind,label:d.label}))
        }catch(e){ results.mediaDevices = "blocked" }

        // --- Permissions ---
        const perms = ["camera","microphone","geolocation","notifications"]
        results.permissions = {}
        for(const p of perms){
            try{
                const status = await navigator.permissions.query({name:p})
                results.permissions[p] = status.state
            }catch(e){ results.permissions[p] = "unsupported" }
        }

        // --- WebRTC local IP ---
        results.webrtcIP = await new Promise(resolve=>{
            const pc = new RTCPeerConnection({iceServers:[]})
            pc.createDataChannel("")
            pc.createOffer().then(offer=>pc.setLocalDescription(offer))
            let finished = false
            pc.onicecandidate = event=>{
                if(finished) return
                if(!event.candidate) return
                const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/)
                if(ipMatch){ finished=true; resolve(ipMatch[1]); pc.close() }
            }
            setTimeout(()=>{ if(!finished) resolve("unknown") },2000)
        })

        // --- Bot detection scoring ---
        let botScore=0,botReasons=[]
        if(navigator.webdriver){ botScore+=40; botReasons.push("webdriver") }
        if(navigator.plugins.length===0){ botScore+=15; botReasons.push("no plugins") }
        if(!navigator.languages){ botScore+=10; botReasons.push("missing languages") }
        if(screen.width===0 || screen.height===0){ botScore+=20; botReasons.push("invalid screen") }
        if(results.webgl==="no-webgl" || results.webgl==="error"){ botScore+=10; botReasons.push("no webgl") }

        results.botDetection = {
            score: botScore,
            reasons: botReasons,
            risk: botScore>60?"high":botScore>30?"medium":"low"
        }

    }catch(e){
        results.error = e.toString()
    }

    // --- Display ---
    document.getElementById("results").innerText = JSON.stringify(results,null,2)

})
</script>
</body>
</html>
