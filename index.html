<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fingerprint Risk Debug</title>

<style>
body{
background:#0a0a0a;
color:#00ff9c;
font-family:monospace;
padding:20px;
}

h1{
color:#00e1ff;
}

.pass{
color:#00ff00;
font-size:28px;
}

.fail{
color:#ff3b3b;
font-size:28px;
}

pre{
background:#111;
padding:15px;
border-radius:8px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Browser Fingerprint Debug</h1>

<div id="status"></div>

<pre id="output"></pre>

<script>

let result={}
let warnings=[]

function log(title,data){

result[title]=data

document.getElementById("output").textContent+=
"===== "+title+" =====\n"+
JSON.stringify(data,null,2)+"\n\n"

console.log(title,data)

}

function hash(str){

let h=0
for(let i=0;i<str.length;i++){
h=((h<<5)-h)+str.charCodeAt(i)
h|=0
}

return h

}

/***********************
Browser
***********************/

log("browser",{

userAgent:navigator.userAgent,
platform:navigator.platform,
languages:navigator.languages,
hardwareConcurrency:navigator.hardwareConcurrency,
deviceMemory:navigator.deviceMemory,
devicePixelRatio:window.devicePixelRatio,

screen:{
width:screen.width,
height:screen.height,
colorDepth:screen.colorDepth
}

})



/***********************
Canvas
***********************/

function canvasFP(){

const canvas=document.createElement("canvas")

canvas.width=400
canvas.height=200

const ctx=canvas.getContext("2d")

ctx.textBaseline="top"
ctx.font="16px Arial"

ctx.fillStyle="#f60"
ctx.fillRect(50,20,100,50)

ctx.fillStyle="#069"
ctx.fillText("Canvas Fingerprint",2,30)

ctx.strokeStyle="#ff00ff"
ctx.arc(120,100,60,0,Math.PI*2)
ctx.stroke()

const dataURL=canvas.toDataURL()

return{

hash:hash(dataURL),
length:dataURL.length

}

}

const canvasInfo=canvasFP()

log("canvas",canvasInfo)



/***********************
WebGL
***********************/

function detectGL(type){

const canvas=document.createElement("canvas")

const gl=canvas.getContext(type)

if(!gl) return {error:type+" unsupported"}

const debug=gl.getExtension("WEBGL_debug_renderer_info")

let vendor=null
let renderer=null

if(debug){

vendor=gl.getParameter(debug.UNMASKED_VENDOR_WEBGL)
renderer=gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)

}else{

vendor=gl.getParameter(gl.VENDOR)
renderer=gl.getParameter(gl.RENDERER)

}

let extensions=gl.getSupportedExtensions()

let extHash=hash(extensions.join(","))

let caps={

MAX_TEXTURE_SIZE:gl.getParameter(gl.MAX_TEXTURE_SIZE),
MAX_RENDERBUFFER_SIZE:gl.getParameter(gl.MAX_RENDERBUFFER_SIZE),
MAX_VERTEX_ATTRIBS:gl.getParameter(gl.MAX_VERTEX_ATTRIBS)

}

return{

context:type,
vendor,
renderer,

version:gl.getParameter(gl.VERSION),

extensions_count:extensions.length,
extensions_hash:extHash,

capability:caps

}

}

const webgl1=detectGL("webgl")
const webgl2=detectGL("webgl2")

log("webgl1",webgl1)
log("webgl2",webgl2)



/***********************
WebGPU
***********************/

async function detectGPU(){

if(!navigator.gpu) return {supported:false}

try{

const adapter=await navigator.gpu.requestAdapter()

if(!adapter) return {adapter:null}

return{

name:adapter.name,
limits:adapter.limits

}

}catch(e){

return {error:e.toString()}

}

}



/***********************
Audio
***********************/

async function audioFP(){

try{

let ctx=new OfflineAudioContext(1,44100,44100)

let osc=ctx.createOscillator()
osc.type="triangle"

let comp=ctx.createDynamicsCompressor()

osc.connect(comp)
comp.connect(ctx.destination)

osc.start()

let buffer=await ctx.startRendering()

let data=buffer.getChannelData(0)

let sum=0

for(let i=0;i<data.length;i++){

sum+=Math.abs(data[i])

}

return{

value:sum,
hash:hash(sum.toString())

}

}catch(e){

return {error:e.toString()}

}

}



/***********************
Risk Detection
***********************/

function runChecks(){

if(webgl1.renderer!==webgl2.renderer){

warnings.push("WebGL1/WebGL2 renderer mismatch")

}

if(webgl1.extensions_count<5){

warnings.push("WebGL extensions unusually low")

}

if(webgl1.capability.MAX_TEXTURE_SIZE<4096){

warnings.push("GPU capability abnormal")

}

if(!webgl1.renderer){

warnings.push("Renderer missing")

}

if(canvasInfo.length<1000){

warnings.push("Canvas fingerprint abnormal")

}

}



/***********************
Run
***********************/

async function run(){

const gpu=await detectGPU()

log("webgpu",gpu)

const audio=await audioFP()

log("audio",audio)

runChecks()

let pass=warnings.length===0

const status=document.getElementById("status")

if(pass){

status.innerHTML="<div class='pass'>PASS ✓ No obvious fingerprint anomaly detected</div>"

}else{

status.innerHTML="<div class='fail'>FAIL ⚠ Fingerprint anomalies detected</div>"

document.getElementById("output").textContent+=
"===== WARNINGS =====\n"+
warnings.join("\n")

}

}

run()

</script>

</body>
</html>
